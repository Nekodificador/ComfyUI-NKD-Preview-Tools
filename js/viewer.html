<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview Window</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#080808;overflow:hidden;cursor:grab;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
body.panning{cursor:grabbing}
#wrap{
    width:100%;height:100%;position:relative;overflow:hidden;
    background-color:#050505;
    background-image: 
        linear-gradient(45deg, #101010 25%, transparent 25%), 
        linear-gradient(-45deg, #101010 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #101010 75%), 
        linear-gradient(-45deg, transparent 75%, #101010 75%);
    background-size:20px 20px;
    background-position:0 0, 0 10px, 10px -10px, -10px 0px;
}
#img,#ref-img{
    position:absolute;top:0;left:0;
    display:block;transform-origin:0 0;
    transition:opacity 0.15s;
    user-select:none;-webkit-user-drag:none;
}
#ref-img{display:none;z-index:1}
body.holding-ref #img{visibility:hidden}
body.holding-ref #ref-img{display:block}
#ref-badge{
    position:fixed;top:14px;left:14px;
    background:rgba(180,32,48,0.92);
    color:#fff;font:bold 11px monospace;
    padding:4px 9px;border-radius:4px;
    pointer-events:none;display:none;z-index:5;
    letter-spacing:1px;backdrop-filter:blur(4px);
}
body.holding-ref #ref-badge{display:block}
#mask-ov{
    position:absolute;top:0;left:0;transform-origin:0 0;
    pointer-events:none;display:none;z-index:2;
    -webkit-mask-size:100% 100%;mask-size:100% 100%;
    -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
    -webkit-mask-mode:luminance;mask-mode:luminance;
}
body.holding-mask #mask-ov,body.mask-on #mask-ov{display:block}
#mask-ctl{display:flex;gap:6px;align-items:center;}
#btn-mask{user-select:none;background:rgba(40,28,32,0.92);border-color:rgba(255,180,180,0.18);}
#btn-mask:hover{background:rgba(72,40,48,0.96);color:#fff}
#btn-mask.active{background:rgba(180,32,48,0.95);color:#fff}
#mask-color{width:26px;height:26px;padding:0;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:none;cursor:pointer;}
#mask-op{width:80px;cursor:pointer;}
#btn-hold{
    position:fixed;bottom:18px;left:18px;
    z-index:6;user-select:none;
    background:rgba(40,28,32,0.92);
    border-color:rgba(255,180,180,0.18);
}
#btn-hold:hover{background:rgba(72,40,48,0.96);color:#fff}
#btn-hold.active{background:rgba(180,32,48,0.95);color:#fff}
#bar,#btn-close,#btn-hold{
    opacity:0;transition:opacity 0.25s;
}
body:hover #bar,
body:hover #btn-close,
body:hover #btn-hold{opacity:1}
#bar{
    position:fixed;bottom:18px;right:18px;
    display:flex;gap:8px;
}
.vbtn{
    background:rgba(28,28,28,0.92);
    border:1px solid rgba(255,255,255,0.12);
    color:#ccc;padding:6px 15px;
    border-radius:6px;cursor:pointer;
    font-size:13px;backdrop-filter:blur(6px);
    transition:background 0.14s,color 0.14s;
}
.vbtn:hover{background:rgba(72,72,72,0.96);color:#fff}
.vbtn.active{background:rgba(46,58,46,0.95);color:#7dc97d}
#btn-run{background:rgba(46,58,46,0.92);border-color:rgba(125,201,125,0.35);color:#9fe09f}
#btn-run:hover{background:rgba(60,84,60,0.96);color:#fff}
#btn-close{
    position:fixed;top:14px;right:14px;
    z-index:6;
}
#dims{
    position:fixed;bottom:60px;left:18px;
    font:11px monospace;color:rgba(255,255,255,0.22);
    pointer-events:none;
}
#empty-state{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;color:rgba(255,255,255,0.18);pointer-events:none;
}
#empty-state svg{width:64px;height:64px;}
#empty-state p{font:14px/1.4 monospace;margin:0;letter-spacing:0.02em;}
#empty-state.hidden{display:none;}
</style>
</head>
<body>
<div id="wrap">
  <img id="img" alt="" draggable="false">
  <img id="ref-img" alt="" draggable="false">
  <div id="mask-ov"></div>
  <div id="empty-state">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="12" width="48" height="40" rx="4" stroke="currentColor" stroke-width="2.5"/>
      <circle cx="22" cy="26" r="4" stroke="currentColor" stroke-width="2.5"/>
      <path d="M8 42 L20 30 L30 40 L40 28 L56 44" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>
    <p>Run the node to preview an image</p>
  </div>
</div>
<div id="ref-badge">REF</div>
<button id="btn-close" class="vbtn">&#x2715; Close</button>
<button id="btn-hold" class="vbtn" title="Hold to show reference image (Space)" style="display:none">&#x21C4; Hold for Ref</button>
<div id="dims"></div>
<div id="bar">
  <button id="btn-run" class="vbtn" title="Queue this node (Shift+Q)">&#x25B6; Run</button>
  <button id="btn-fit-zoom" class="vbtn" title="Fit image to window (0)">&#x26F6; Fit Image</button>
  <button id="btn-100" class="vbtn" title="Actual Size (1)">1:1 Pixel</button>
  <button id="btn-adjust" class="vbtn" title="Fit window to image size">&#x2921; Fit Window</button>
  <button id="btn-save" class="vbtn" title="Save image (S)">&#x1F4BE; Save</button>
  <span id="mask-ctl" style="display:none">
    <button id="btn-mask" class="vbtn" title="Toggle the reference mask overlay — hold M to peek">&#x25A6; Mask</button>
    <input type="color" id="mask-color" title="Overlay colour">
    <input type="range" id="mask-op" min="5" max="100" title="Overlay opacity">
  </span>
</div>
<script>
(function () {
    const params = new URLSearchParams(location.search);
    const initImg = params.get("img") || "";
    const initTitle = params.get("title") || "Preview Window";
    // PiP path stashes the reference URL on window before this script runs;
    // popup-window path uses query string. Either source is valid.
    const refUrl = (typeof window.__nkd_ref_url === "string" && window.__nkd_ref_url)
                   || params.get("ref") || "";
    const compareMode = (params.get("compare") === "1" || !!window.__nkd_ref_url) && !!refUrl;
    // Reference mask overlay: PiP path stashes the URL on window; popup path uses query.
    const maskUrl = (typeof window.__nkd_mask_url === "string" && window.__nkd_mask_url)
                    || params.get("mask") || "";
    const maskMode = !!maskUrl;
    document.title = initTitle;

    // Image metadata (filename/type/subfolder) for server-side save.
    // PiP path sets window.__nkd_img_meta; popup path uses query string.
    let imgMeta = (typeof window.__nkd_img_meta === "object" && window.__nkd_img_meta) || null;
    if (!imgMeta) {
        const mf = params.get("meta_filename");
        const mt = params.get("meta_type");
        const ms = params.get("meta_subfolder");
        if (mf && mt) imgMeta = { filename: mf, type: mt, subfolder: ms || "" };
    }

    const img = document.getElementById("img");
    const refImg = document.getElementById("ref-img");
    const wrap = document.getElementById("wrap");
    const dims = document.getElementById("dims");
    const btnHold = document.getElementById("btn-hold");
    const maskOv = document.getElementById("mask-ov");

    let scale = 1, tx = 0, ty = 0, fitScale = 1;
    let panning = false, sx = 0, sy = 0, stx = 0, sty = 0;

    function apply() {
        const rendering = scale > 1.0 ? "pixelated" : "auto";
        img.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")";
        img.style.imageRendering = rendering;
        if (compareMode) applyRefTransform(rendering);
        if (maskMode) applyMaskTransform();
    }

    // Overlay the mask 1:1 over the current image's box (mask-size:100% stretches
    // to fit if its resolution differs from the image).
    function applyMaskTransform() {
        var nw = img.naturalWidth, nh = img.naturalHeight;
        if (!nw || !nh) return;
        maskOv.style.width  = nw + "px";
        maskOv.style.height = nh + "px";
        maskOv.style.transform = img.style.transform;
    }

    /** Match the reference to the current image's display box.
     * - Same aspect ratio: ref is scaled to fill the current's box exactly.
     * - Different aspect ratio: ref is fit (contain) inside that box and centered.
     * Uses width/height (not transform scale) so refImg's natural size doesn't
     * leak into the layout — the transform stays in lock-step with #img. */
    function applyRefTransform(rendering) {
        const cw = img.naturalWidth, ch = img.naturalHeight;
        const rw = refImg.naturalWidth, rh = refImg.naturalHeight;
        if (!cw || !ch || !rw || !rh) {
            refImg.style.transform = img.style.transform;
            refImg.style.imageRendering = rendering;
            return;
        }
        const cAR = cw / ch, rAR = rw / rh;
        let dispW, dispH, offX = 0, offY = 0;
        if (Math.abs(cAR - rAR) < 1e-3) {
            // Same aspect — fill.
            dispW = cw; dispH = ch;
        } else if (rAR > cAR) {
            // Ref is wider — fit by width, letterbox vertically.
            dispW = cw; dispH = cw / rAR;
            offY = (ch - dispH) / 2;
        } else {
            // Ref is taller — fit by height, letterbox horizontally.
            dispH = ch; dispW = ch * rAR;
            offX = (cw - dispW) / 2;
        }
        refImg.style.width  = dispW + "px";
        refImg.style.height = dispH + "px";
        refImg.style.transform =
            "translate(" + (tx + offX * scale) + "px," + (ty + offY * scale) + "px) scale(" + scale + ")";
        refImg.style.imageRendering = rendering;
    }

    function fit() {
        var ww = wrap.clientWidth, wh = wrap.clientHeight;
        var nw = img.naturalWidth, nh = img.naturalHeight;
        if (!nw || !nh) return;
        fitScale = Math.min(ww / nw, wh / nh);
        scale = fitScale;
        tx = (ww - nw * fitScale) / 2;
        ty = (wh - nh * fitScale) / 2;
        apply();
        dims.textContent = nw + " \u00d7 " + nh + " px";
    }

    window.fit = fit;
    window.addEventListener("resize", fit);

    document.getElementById("btn-fit-zoom").addEventListener("click", fit);

    document.getElementById("btn-100").addEventListener("click", function () {
        var rect = wrap.getBoundingClientRect();
        var cx = rect.width / 2, cy = rect.height / 2;
        var ns = 1.0;
        var r = ns / scale;
        tx = cx - (cx - tx) * r;
        ty = cy - (cy - ty) * r;
        scale = ns;
        apply();
    });

    document.getElementById("btn-adjust").addEventListener("click", function () {
        var nw = img.naturalWidth, nh = img.naturalHeight;
        if (!nw || !nh) return;

        // 1. Calculamos cuánto miden los bordes de la ventana de Windows
        var dx = window.outerWidth - window.innerWidth;
        var dy = window.outerHeight - window.innerHeight;
        
        // Fallback por si el navegador devuelve valores raros
        if (dx < 0 || isNaN(dx)) dx = 16; 
        if (dy < 0 || isNaN(dy)) dy = 39;

        var maxW = Math.round(screen.availWidth * 0.95);
        var maxH = Math.round(screen.availHeight * 0.95);

        // 2. Ajustamos el tamaño basándonos en el zoom actual (scale)
        var curW = nw * scale;
        var curH = nh * scale;

        // 3. Sumamos los bordes (dx, dy) al tamaño de la imagen
        var w = Math.max(320, Math.min(Math.round(curW + dx), maxW));
        var h = Math.max(240, Math.min(Math.round(curH + dy), maxH));
        
        var left = Math.round((screen.availWidth - w) / 2) + (screen.availLeft ?? 0);
        var top = Math.round((screen.availHeight - h) / 2) + (screen.availTop ?? 0);

        window.resizeTo(w, h);
        window.moveTo(left, top);
    });

    document.getElementById("btn-close").addEventListener("click", () => window.close());

    // Queue/Run — bridges back to the main ComfyUI realm via __nkd_queue,
    // injected on this window by the PopupWin that opened us (PiP / popup path).
    document.getElementById("btn-run").addEventListener("click", () => window.__nkd_queue?.());

    const emptyState = document.getElementById("empty-state");
    img.addEventListener("load", () => {
        fit();
        img.style.opacity = "1";
        emptyState.classList.add("hidden");
    });
    if (initImg) img.src = initImg;

    // ── Save (download via <a download>, same as ComfyUI right-click) ─────────
    function saveImage() {
        if (!imgMeta) return;
        // Derive the API origin from the current image src — it always contains
        // the correct host:port, including Comfy Desktop where location.origin
        // can resolve to "about:null". We intentionally never read another
        // window's location (window.opener / window.parent): that cross-origin
        // access trips the registry security scanner and is unnecessary, since
        // the served image URL already carries the right origin.
        let apiBase = null;
        try {
            apiBase = img.src ? new URL(img.src).origin : null;
        } catch { apiBase = null; }
        if (!apiBase || apiBase === "null") {
            try { apiBase = new URL(initImg).origin; } catch { apiBase = null; }
        }
        if (!apiBase || apiBase === "null") apiBase = location.origin;

        const viewUrl = new URL("/view", apiBase);
        viewUrl.searchParams.set("filename",  imgMeta.filename);
        viewUrl.searchParams.set("type",      imgMeta.type);
        viewUrl.searchParams.set("subfolder", imgMeta.subfolder);
        const a = document.createElement("a");
        a.href     = viewUrl.href;
        a.download = imgMeta.filename;
        a.click();
    }

    document.getElementById("btn-save").addEventListener("click", saveImage);

    // Interaction (Wheel, Drag, DblClick)
    wrap.addEventListener("wheel", e => {
        e.preventDefault();
        var rect = wrap.getBoundingClientRect();
        var cx = e.clientX - rect.left, cy = e.clientY - rect.top;
        var factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
        var ns = Math.max(fitScale * 0.1, Math.min(scale * factor, fitScale * 32));
        var r = ns / scale;
        tx = cx - (cx - tx) * r; ty = cy - (cy - ty) * r;
        scale = ns; apply();
    }, { passive: false });

    wrap.addEventListener("mousedown", e => {
        if (e.button !== 0) return;
        panning = true; sx = e.clientX; sy = e.clientY; stx = tx; sty = ty;
        document.body.classList.add("panning");
    });
    document.addEventListener("mousemove", e => {
        if (!panning) return;
        tx = stx + (e.clientX - sx); ty = sty + (e.clientY - sy); apply();
    });
    document.addEventListener("mouseup", () => {
        panning = false; document.body.classList.remove("panning");
    });
    wrap.addEventListener("dblclick", e => {
        var rect = wrap.getBoundingClientRect();
        if (Math.abs(scale - 1.0) < 0.001) fit();
        else {
            var ns = 1.0, r = ns / scale;
            tx = (e.clientX - rect.left) - (e.clientX - rect.left - tx) * r;
            ty = (e.clientY - rect.top) - (e.clientY - rect.top - ty) * r;
            scale = ns; apply();
        }
    });

    document.addEventListener("keydown", e => {
        const tag = document.activeElement?.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA") return;
        if ((e.key === "q" || e.key === "Q") && e.shiftKey) { e.preventDefault(); window.__nkd_queue?.(); return; }
        if (e.key === "Escape") window.close();
        if (e.key === "0" || e.key === "r") fit();
        if (e.key === "1") document.getElementById("btn-100").click();
        if (e.key === "s" || e.key === "S") saveImage();
    });


    // ── Press-and-hold compare (mouse on the button OR Space anywhere) ──────
    if (compareMode) {
        refImg.src = refUrl;
        // Mirror current transform once the ref naturally loads.
        refImg.addEventListener("load", apply);
        btnHold.style.display = "";

        let holding = false;
        const showRef = () => {
            if (holding) return;
            holding = true;
            document.body.classList.add("holding-ref");
            btnHold.classList.add("active");
        };
        const showCur = () => {
            if (!holding) return;
            holding = false;
            document.body.classList.remove("holding-ref");
            btnHold.classList.remove("active");
        };

        btnHold.addEventListener("mousedown", e => { e.preventDefault(); showRef(); });
        // Release wherever the cursor ends up — protects against drag-off-button.
        window.addEventListener("mouseup", showCur);
        window.addEventListener("blur", showCur);

        // Touch support: same press-and-hold semantics.
        btnHold.addEventListener("touchstart", e => { e.preventDefault(); showRef(); }, { passive: false });
        window.addEventListener("touchend", showCur);
        window.addEventListener("touchcancel", showCur);

        // Space = global hold shortcut (only when not typing in an input).
        document.addEventListener("keydown", e => {
            if (e.code !== "Space" || e.repeat) return;
            const tag = document.activeElement?.tagName;
            if (tag === "INPUT" || tag === "TEXTAREA") return;
            e.preventDefault();
            showRef();
        });
        document.addEventListener("keyup", e => {
            if (e.code !== "Space") return;
            e.preventDefault();
            showCur();
        });
    }

    // ── Mask overlay (press-and-hold M / button; colour + opacity) ───────────
    if (maskMode) {
        const maskCtl = document.getElementById("mask-ctl");
        const btnMask = document.getElementById("btn-mask");
        const colorIn = document.getElementById("mask-color");
        const opIn    = document.getElementById("mask-op");
        maskCtl.style.display = "";
        maskOv.style.webkitMaskImage = 'url("' + maskUrl + '")';
        maskOv.style.maskImage       = 'url("' + maskUrl + '")';

        colorIn.value = localStorage.getItem("nkd_mask_color") || "#ff2f38";
        opIn.value    = localStorage.getItem("nkd_mask_op")    || "50";
        const styleMask = () => { maskOv.style.backgroundColor = colorIn.value; maskOv.style.opacity = String(opIn.value / 100); };
        styleMask();
        colorIn.addEventListener("input", () => { styleMask(); localStorage.setItem("nkd_mask_color", colorIn.value); });
        opIn.addEventListener("input",    () => { styleMask(); localStorage.setItem("nkd_mask_op",    opIn.value); });

        // Button = persistent toggle; M = momentary peek (independent of the toggle).
        let maskOn = false;
        const setToggle = (on) => { maskOn = on; document.body.classList.toggle("mask-on", on); btnMask.classList.toggle("active", on); if (on) applyMaskTransform(); };
        btnMask.addEventListener("click", () => setToggle(!maskOn));

        let peeking = false;
        const peekOn  = () => { if (peeking) return; peeking = true;  applyMaskTransform(); document.body.classList.add("holding-mask"); };
        const peekOff = () => { if (!peeking) return; peeking = false; document.body.classList.remove("holding-mask"); };
        window.addEventListener("blur", peekOff);

        document.addEventListener("keydown", e => {
            if ((e.key !== "m" && e.key !== "M") || e.repeat) return;
            const tag = document.activeElement?.tagName;
            if (tag === "INPUT" || tag === "TEXTAREA") return;
            e.preventDefault();
            peekOn();
        });
        document.addEventListener("keyup", e => {
            if (e.key !== "m" && e.key !== "M") return;
            e.preventDefault();
            peekOff();
        });
    }
}());
</script>
</body>
</html>
