<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview Window</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#080808;overflow:hidden;cursor:grab}
body.panning{cursor:grabbing}
#wrap{
    width:100%;height:100%;position:relative;overflow:hidden;
    background-color:#050505;
    background-image: 
        linear-gradient(45deg, #101010 25%, transparent 25%), 
        linear-gradient(-45deg, #101010 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #101010 75%), 
        linear-gradient(-45deg, transparent 75%, #101010 75%);
    background-size:20px 20px;
    background-position:0 0, 0 10px, 10px -10px, -10px 0px;
}
#img,#ref-img{
    position:absolute;top:0;left:0;
    display:block;transform-origin:0 0;
    transition:opacity 0.15s;
    user-select:none;-webkit-user-drag:none;
}
#ref-img{display:none;z-index:1}
body.holding-ref #img{visibility:hidden}
body.holding-ref #ref-img{display:block}
#ref-badge{
    position:fixed;top:14px;left:14px;
    background:rgba(180,32,48,0.92);
    color:#fff;font:bold 11px monospace;
    padding:4px 9px;border-radius:4px;
    pointer-events:none;display:none;z-index:5;
    letter-spacing:1px;backdrop-filter:blur(4px);
}
body.holding-ref #ref-badge{display:block}
#btn-hold{
    position:fixed;top:14px;right:14px;
    background:rgba(40,28,32,0.92);
    border:1px solid rgba(255,180,180,0.18);
    color:#ddd;padding:8px 16px;
    border-radius:6px;cursor:pointer;
    font-size:13px;backdrop-filter:blur(6px);
    transition:background 0.14s,color 0.14s;
    z-index:6;user-select:none;
}
#btn-hold:hover{background:rgba(72,40,48,0.96);color:#fff}
#btn-hold.active{background:rgba(180,32,48,0.95);color:#fff}
#bar{
    position:fixed;bottom:18px;right:18px;
    display:flex;gap:8px;
    opacity:0;transition:opacity 0.25s;
}
body:hover #bar{opacity:1}
#bar button{
    background:rgba(28,28,28,0.92);
    border:1px solid rgba(255,255,255,0.12);
    color:#ccc;padding:6px 15px;
    border-radius:6px;cursor:pointer;
    font-size:13px;backdrop-filter:blur(6px);
    transition:background 0.14s,color 0.14s;
}
#bar button:hover{background:rgba(72,72,72,0.96);color:#fff}
#bar button.active{background:rgba(46,58,46,0.95);color:#7dc97d}
#dims{
    position:fixed;bottom:20px;left:16px;
    font:11px monospace;color:rgba(255,255,255,0.22);
    pointer-events:none;
}
#info-panel{
    position:absolute;top:10px;left:10px;
    background:rgba(8,8,8,0.84);
    border:1px solid rgba(255,255,255,0.09);
    border-radius:5px;padding:7px 11px;
    font:11px/1.8 monospace;color:#888;
    pointer-events:none;backdrop-filter:blur(6px);
    display:none;z-index:2;
}
#info-panel.visible{display:block}
</style>
</head>
<body>
<div id="wrap">
  <img id="img" alt="" draggable="false">
  <img id="ref-img" alt="" draggable="false">
  <div id="info-panel"><div id="ip-dims">—</div><div id="ip-zoom">Zoom: 100%</div><div id="ip-format">Format: RGB</div></div>
</div>
<div id="ref-badge">REF</div>
<button id="btn-hold" title="Hold to show reference image (Space)" style="display:none">&#x21C4; Hold for Ref</button>
<div id="dims"></div>
<div id="bar">
  <button id="btn-info">&#x2139; Info</button>
  <button id="btn-fit-zoom" title="Fit image to window (0)">&#x26F6; Fit Image</button>
  <button id="btn-100" title="Actual Size (1)">1:1 Pixel</button>
  <button id="btn-adjust" title="Fit window to image size">&#x2921; Fit Window</button>
  <button id="btn-close">&#x2715; Close</button>
</div>
<script>
(function () {
    const params = new URLSearchParams(location.search);
    const initImg = params.get("img") || "";
    const initTitle = params.get("title") || "Preview Window";
    // PiP path stashes the reference URL on window before this script runs;
    // popup-window path uses query string. Either source is valid.
    const refUrl = (typeof window.__nkd_ref_url === "string" && window.__nkd_ref_url)
                   || params.get("ref") || "";
    const compareMode = (params.get("compare") === "1" || !!window.__nkd_ref_url) && !!refUrl;
    document.title = initTitle;

    const img = document.getElementById("img");
    const refImg = document.getElementById("ref-img");
    const wrap = document.getElementById("wrap");
    const dims = document.getElementById("dims");
    const panel = document.getElementById("info-panel");
    const ipDims = document.getElementById("ip-dims");
    const ipZoom = document.getElementById("ip-zoom");
    const btnHold = document.getElementById("btn-hold");

    let scale = 1, tx = 0, ty = 0, fitScale = 1;
    let panning = false, sx = 0, sy = 0, stx = 0, sty = 0;

    function apply() {
        const rendering = scale > 1.0 ? "pixelated" : "auto";
        img.style.transform = "translate("+tx+"px,"+ty+"px) scale("+scale+")";
        img.style.imageRendering = rendering;
        if (compareMode) applyRefTransform(rendering);
        if (fitScale) ipZoom.textContent = "Zoom: " + Math.round((scale / fitScale) * 100) + "%";
    }

    /** Match the reference to the current image's display box.
     * - Same aspect ratio: ref is scaled to fill the current's box exactly.
     * - Different aspect ratio: ref is fit (contain) inside that box and centered.
     * Uses width/height (not transform scale) so refImg's natural size doesn't
     * leak into the layout — the transform stays in lock-step with #img. */
    function applyRefTransform(rendering) {
        const cw = img.naturalWidth, ch = img.naturalHeight;
        const rw = refImg.naturalWidth, rh = refImg.naturalHeight;
        if (!cw || !ch || !rw || !rh) {
            refImg.style.transform = img.style.transform;
            refImg.style.imageRendering = rendering;
            return;
        }
        const cAR = cw / ch, rAR = rw / rh;
        let dispW, dispH, offX = 0, offY = 0;
        if (Math.abs(cAR - rAR) < 1e-3) {
            // Same aspect — fill.
            dispW = cw; dispH = ch;
        } else if (rAR > cAR) {
            // Ref is wider — fit by width, letterbox vertically.
            dispW = cw; dispH = cw / rAR;
            offY = (ch - dispH) / 2;
        } else {
            // Ref is taller — fit by height, letterbox horizontally.
            dispH = ch; dispW = ch * rAR;
            offX = (cw - dispW) / 2;
        }
        refImg.style.width  = dispW + "px";
        refImg.style.height = dispH + "px";
        refImg.style.transform =
            "translate(" + (tx + offX * scale) + "px," + (ty + offY * scale) + "px) scale(" + scale + ")";
        refImg.style.imageRendering = rendering;
    }

    function fit() {
        var ww = wrap.clientWidth, wh = wrap.clientHeight;
        var nw = img.naturalWidth, nh = img.naturalHeight;
        if (!nw || !nh) return;
        fitScale = Math.min(ww / nw, wh / nh);
        scale = fitScale;
        tx = (ww - nw * fitScale) / 2;
        ty = (wh - nh * fitScale) / 2;
        apply();
        var label = nw + " \u00d7 " + nh + " px";
        ipDims.textContent = label;
        dims.textContent = label;
    }

    window.fit = fit;
    window.addEventListener("resize", fit);

    // Buttons
    document.getElementById("btn-info").addEventListener("click", function () {
        panel.classList.toggle("visible");
        this.classList.toggle("active", panel.classList.contains("visible"));
    });

    document.getElementById("btn-fit-zoom").addEventListener("click", fit);

    document.getElementById("btn-100").addEventListener("click", function () {
        var rect = wrap.getBoundingClientRect();
        var cx = rect.width / 2, cy = rect.height / 2;
        var ns = 1.0;
        var r = ns / scale;
        tx = cx - (cx - tx) * r;
        ty = cy - (cy - ty) * r;
        scale = ns;
        apply();
    });

    document.getElementById("btn-adjust").addEventListener("click", function () {
        var nw = img.naturalWidth, nh = img.naturalHeight;
        if (!nw || !nh) return;

        // 1. Calculamos cuánto miden los bordes de la ventana de Windows
        var dx = window.outerWidth - window.innerWidth;
        var dy = window.outerHeight - window.innerHeight;
        
        // Fallback por si el navegador devuelve valores raros
        if (dx < 0 || isNaN(dx)) dx = 16; 
        if (dy < 0 || isNaN(dy)) dy = 39;

        var maxW = Math.round(screen.availWidth * 0.95);
        var maxH = Math.round(screen.availHeight * 0.95);

        // 2. Ajustamos el tamaño basándonos en el zoom actual (scale)
        var curW = nw * scale;
        var curH = nh * scale;

        // 3. Sumamos los bordes (dx, dy) al tamaño de la imagen
        var w = Math.max(320, Math.min(Math.round(curW + dx), maxW));
        var h = Math.max(240, Math.min(Math.round(curH + dy), maxH));
        
        var left = Math.round((screen.availWidth - w) / 2) + (screen.availLeft ?? 0);
        var top = Math.round((screen.availHeight - h) / 2) + (screen.availTop ?? 0);

        window.resizeTo(w, h);
        window.moveTo(left, top);
    });

    document.getElementById("btn-close").addEventListener("click", () => window.close());

    img.addEventListener("load", () => { fit(); img.style.opacity = "1"; });
    if (initImg) img.src = initImg;

    // Interaction (Wheel, Drag, DblClick)
    wrap.addEventListener("wheel", e => {
        e.preventDefault();
        var rect = wrap.getBoundingClientRect();
        var cx = e.clientX - rect.left, cy = e.clientY - rect.top;
        var factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
        var ns = Math.max(fitScale * 0.1, Math.min(scale * factor, fitScale * 32));
        var r = ns / scale;
        tx = cx - (cx - tx) * r; ty = cy - (cy - ty) * r;
        scale = ns; apply();
    }, { passive: false });

    wrap.addEventListener("mousedown", e => {
        if (e.button !== 0) return;
        panning = true; sx = e.clientX; sy = e.clientY; stx = tx; sty = ty;
        document.body.classList.add("panning");
    });
    document.addEventListener("mousemove", e => {
        if (!panning) return;
        tx = stx + (e.clientX - sx); ty = sty + (e.clientY - sy); apply();
    });
    document.addEventListener("mouseup", () => {
        panning = false; document.body.classList.remove("panning");
    });
    wrap.addEventListener("dblclick", e => {
        var rect = wrap.getBoundingClientRect();
        if (Math.abs(scale - 1.0) < 0.001) fit();
        else {
            var ns = 1.0, r = ns / scale;
            tx = (e.clientX - rect.left) - (e.clientX - rect.left - tx) * r;
            ty = (e.clientY - rect.top) - (e.clientY - rect.top - ty) * r;
            scale = ns; apply();
        }
    });

    document.addEventListener("keydown", e => {
        if (e.key === "Escape") window.close();
        if (e.key === "0" || e.key === "r") fit();
        if (e.key === "1") document.getElementById("btn-100").click();
    });

    // ── Press-and-hold compare (mouse on the button OR Space anywhere) ──────
    if (compareMode) {
        refImg.src = refUrl;
        // Mirror current transform once the ref naturally loads.
        refImg.addEventListener("load", apply);
        btnHold.style.display = "";

        let holding = false;
        const showRef = () => {
            if (holding) return;
            holding = true;
            document.body.classList.add("holding-ref");
            btnHold.classList.add("active");
        };
        const showCur = () => {
            if (!holding) return;
            holding = false;
            document.body.classList.remove("holding-ref");
            btnHold.classList.remove("active");
        };

        btnHold.addEventListener("mousedown", e => { e.preventDefault(); showRef(); });
        // Release wherever the cursor ends up — protects against drag-off-button.
        window.addEventListener("mouseup", showCur);
        window.addEventListener("blur", showCur);

        // Touch support: same press-and-hold semantics.
        btnHold.addEventListener("touchstart", e => { e.preventDefault(); showRef(); }, { passive: false });
        window.addEventListener("touchend", showCur);
        window.addEventListener("touchcancel", showCur);

        // Space = global hold shortcut (only when not typing in an input).
        document.addEventListener("keydown", e => {
            if (e.code !== "Space" || e.repeat) return;
            const tag = document.activeElement?.tagName;
            if (tag === "INPUT" || tag === "TEXTAREA") return;
            e.preventDefault();
            showRef();
        });
        document.addEventListener("keyup", e => {
            if (e.code !== "Space") return;
            e.preventDefault();
            showCur();
        });
    }
}());
</script>
</body>
</html>
