name: Publish to Comfy registry
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

jobs:
  publish-node:
    name: Publish Custom Node to registry
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create the git tag + GitHub release below
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
      # Keep the git-clone distribution channel (older ComfyUI-Manager installs)
      # in sync with the registry by tagging + releasing each version bump.
      # Safe: the workflow no longer triggers on tag pushes, so this won't re-run.
      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ -z "$VERSION" ]; then echo "::error::No version found in pyproject.toml"; exit 1; fi
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes
          fi
